map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 443 ssl http2 default_server;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    absolute_redirect off;

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── Kafka REST Proxy ───────────────────────────────────────
    location /poc/kafka-rest/ {
        rewrite ^/poc/kafka-rest(/.*)$ $1 break;
        proxy_pass http://kafka-rest-proxy:8082;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 10M;
    }

    # ── MinIO Console ──────────────────────────────────────────
    location /poc/minio/ {
        rewrite ^/poc/minio(/.*)$ $1 break;
        proxy_pass http://minio:9001;

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;

        proxy_redirect ~^https?://[^/]+(/.*)$ https://$http_host/poc/minio$1;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_buffering off;
        proxy_request_buffering off;
        client_max_body_size 1G;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── MinIO S3 API (presigned URL, mc 접근용) ────────────────
    # 기존 별도 server block (server_name 221.147.232.196) 제거하고 여기로 통합
    # SigV4 signature 가 host + path 에 묶여있어서 path rewrite 금지
    location / {
        proxy_pass http://minio:9000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 100M;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 60s;
    }
}

server {
    listen 80;
    server_name _;
    return 301 https://$host:8443$request_uri;
}
