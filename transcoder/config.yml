kafka:
  bootstrap_servers: kafka:9092
  group_id: red-poc-transcoder
  input_topic: raw.frame.metadata
  output_topic: raw.frame.metadata.decoded

minio:
  endpoint: minio:9000
  access_key: swm
  secret_key: ${MINIO_ROOT_PASSWORD}
  bucket: red-poc
  secure: false

decoder:
  kind: ffmpeg       # ffmpeg | noop
  jpeg_quality: 85
  output_suffix: jpg

metrics:
  port: 2114
