# ============================================================
#  daq-kafka-broker  —  서버 66번 (192.168.1.66)
#
#  스택:
#    broker          Kafka 7.6.1 KRaft (Zookeeper 없음)
#    schema-registry :8081 (내부)
#    rest-proxy      :8082 (내부)
#    daq-consumer    topic consume → transform → MinIO 151번
#    cloudflared     trycloudflare 터널 (포트포워딩/도메인 불필요)
#
#  실행:
#    make up
#    make init     ← 최초 1회 topic 생성
#    make tunnel   ← cloudflare URL 확인
#
#  차량 설정:
#    BROKER_REST_URL=https://xxxx.trycloudflare.com
#    (make tunnel 로 URL 확인 후 차량 config.env 에 입력)
#
#  MinIO 저장 경로:
#    daq/year=YYYY/month=MM/day=dd/{vehicle_id}/{sensor}/{ts_ns}.jpg
# ============================================================

networks:
  broker-net:
    driver: bridge

volumes:
  kafka-data:

services:

  # ── Kafka (KRaft — Zookeeper 없음) ──────────────────────────
  broker:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    restart: unless-stopped
    networks: [broker-net]
    environment:
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}

      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@broker:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://broker:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_RETENTION_HOURS: ${KAFKA_LOG_RETENTION_HOURS:-72}
      KAFKA_LOG_RETENTION_BYTES: ${KAFKA_LOG_RETENTION_BYTES:-107374182400}
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_MESSAGE_MAX_BYTES: 10485760
      KAFKA_REPLICA_FETCH_MAX_BYTES: 10485760
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    logging:
      driver: "json-file"
      options: {max-size: "20m", max-file: "5"}

  # ── Schema Registry ─────────────────────────────────────────
  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.1
    container_name: schema-registry
    restart: unless-stopped
    networks: [broker-net]
    depends_on:
      broker:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: broker:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    logging:
      driver: "json-file"
      options: {max-size: "10m", max-file: "3"}

  # ── Kafka REST Proxy ─────────────────────────────────────────
  # cloudflared 가 이 포트로 터널을 뚫어줌
  rest-proxy:
    image: confluentinc/cp-kafka-rest:7.6.1
    container_name: rest-proxy
    restart: unless-stopped
    networks: [broker-net]
    depends_on:
      broker:
        condition: service_healthy
      schema-registry:
        condition: service_started
    environment:
      KAFKA_REST_HOST_NAME: rest-proxy
      KAFKA_REST_BOOTSTRAP_SERVERS: broker:9092
      KAFKA_REST_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      KAFKA_REST_LISTENERS: http://0.0.0.0:8082
      KAFKA_REST_MAX_REQUEST_SIZE: 10485760
      KAFKA_REST_PRODUCER_MAX_REQUEST_SIZE: 10485760
    ports:
      - "8082:8082"    # cloudflared 가 localhost:8082 로 터널 연결
    logging:
      driver: "json-file"
      options: {max-size: "10m", max-file: "5"}

  # ── DAQ Consumer ─────────────────────────────────────────────
  # topic consume → transform → MinIO 151번 저장
  daq-consumer:
    build:
      context: ./daq-consumer
      dockerfile: Dockerfile
    image: daq-consumer:latest
    container_name: daq-consumer
    restart: unless-stopped
    networks: [broker-net]
    depends_on:
      broker:
        condition: service_healthy
    env_file:
      - ./config/config.env
      - ./config/minio.secret
    environment:
      KAFKA_BOOTSTRAP: broker:9092
      KAFKA_GROUP_ID: daq-consumer-group
      KAFKA_TOPICS: ${TOPIC_CAM0},${TOPIC_CAM1},${TOPIC_CAM2},${TOPIC_GNSS}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MAX_WORKERS: ${CONSUMER_MAX_WORKERS:-4}
      METRICS_PORT: ${CONSUMER_METRICS_PORT:-2122}
      LOG_LEVEL: INFO
    ports:
      - "2122:2122"    # Prometheus metrics
    logging:
      driver: "json-file"
      options: {max-size: "20m", max-file: "5"}

  # ── Cloudflare Tunnel ────────────────────────────────────────
  # trycloudflare: 계정/도메인 불필요, 자동 HTTPS URL 발급
  # URL 확인: make tunnel
  # 주의: 컨테이너 재시작 시 URL 변경됨 → 차량 config.env 재설정 필요
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    network_mode: host    # localhost:8082 접근을 위해 host 네트워크 사용
    command: tunnel --url http://localhost:8082 --no-autoupdate
    logging:
      driver: "json-file"
      options: {max-size: "10m", max-file: "3"}
