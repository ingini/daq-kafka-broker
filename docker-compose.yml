# ============================================================
#  daq-kafka-broker  —  통합 스택 (192.168.1.79)
#
#  red-poc 전체 + daq-kafka-producer 차량 데이터 수신 통합
#
#  실행: ./start.sh
#  종료: ./stop.sh
#  설정: .env 파일만 수정
#
#  외부 접근:
#    https://221.147.232.196:8443/poc/kafka-rest  ← 차량 POST
#    https://221.147.232.196:8443/poc/minio       ← MinIO Console
#    https://221.147.232.196:8443/poc/grafana     ← Grafana
# ============================================================

networks:
  red-poc:
    name: red-poc-net

volumes:
  emqx-data:
  emqx-log:
  kafka-data:
    name: red-poc_kafka-data          # 기존 볼륨 재사용
  postgres-data:
    name: red-poc_postgres-data       # 기존 볼륨 재사용
  prometheus-data:
  grafana-data:
  edge-log:

services:

  # ── Kafka (KRaft — apache/kafka 기존 버전 유지) ──────────────
  kafka:
    image: apache/kafka:3.7.0
    container_name: red-poc-kafka
    restart: unless-stopped
    networks: [red-poc]
    ports:
      - "19092:9092"
      - "29192:29092"
    environment:
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_MESSAGE_MAX_BYTES: ${KAFKA_MESSAGE_MAX_BYTES:-10485760}
      KAFKA_REPLICA_FETCH_MAX_BYTES: ${KAFKA_MESSAGE_MAX_BYTES:-10485760}
      CLUSTER_ID: red-poc-kraft-cluster
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging:
      driver: "json-file"
      options: {max-size: "20m", max-file: "5"}

  # ── Kafka Topic 초기화 ────────────────────────────────────────
  kafka-init:
    image: apache/kafka:3.7.0
    container_name: red-poc-kafka-init
    networks: [red-poc]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
    volumes:
      - ./kafka/init-topics.sh:/init-topics.sh:ro
    entrypoint: ["/bin/bash", "/init-topics.sh"]
    restart: "no"

  # ── Kafka REST Proxy ─────────────────────────────────────────
  # 차량 daq-kafka-producer 가 HTTP POST 로 topic 적재
  kafka-rest-proxy:
    image: confluentinc/cp-kafka-rest:7.5.0
    container_name: red-poc-kafka-rest-proxy
    restart: unless-stopped
    networks: [red-poc]
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "8082:8082"
    environment:
      KAFKA_REST_HOST_NAME: kafka-rest-proxy
      KAFKA_REST_LISTENERS: http://0.0.0.0:8082
      KAFKA_REST_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_REST_PRODUCER_MAX_REQUEST_SIZE: ${KAFKA_MESSAGE_MAX_BYTES:-10485760}
      KAFKA_REST_PRODUCER_COMPRESSION_TYPE: none
      KAFKA_REST_SCHEMA_REGISTRY_URL: http://kafka-rest-proxy:8081
    logging:
      driver: "json-file"
      options: {max-size: "10m", max-file: "5"}

  # ── MinIO ────────────────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    container_name: red-poc-minio
    restart: unless-stopped
    networks: [red-poc]
    ports:
      - "19000:9000"
      - "19001:9001"
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_PROMETHEUS_AUTH_TYPE: ${MINIO_PROMETHEUS_AUTH_TYPE:-public}
      MINIO_BROWSER_REDIRECT_URL: ${RED_EDGE_PUBLIC_URL}/poc/minio
    volumes:
      - /data14/poc-minio:/data    # 기존 데이터 경로 유지
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging:
      driver: "json-file"
      options: {max-size: "10m", max-file: "3"}

  # ── MinIO 버킷 초기화 ─────────────────────────────────────────
  minio-init:
    image: minio/mc:RELEASE.2024-06-12T14-34-03Z
    container_name: red-poc-minio-init
    networks: [red-poc]
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET:-daq}
    volumes:
      - ./kafka/init-bucket.sh:/init-bucket.sh:ro
    entrypoint: ["/bin/sh", "/init-bucket.sh"]
    restart: "no"

  # ── Kafka Image Consumer ──────────────────────────────────────
  # raw.frame.images + sensor.cam*.jpeg → MinIO 저장
  kafka-image-consumer:
    build:
      context: ./kafka-image-consumer
      dockerfile: Dockerfile
    image: red-poc/kafka-image-consumer:dev
    container_name: red-poc-kafka-image-consumer
    restart: unless-stopped
    networks: [red-poc]
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      KAFKA_TOPIC: raw.frame.images
      KAFKA_DLQ_TOPIC: raw.frame.images.dlq
      KAFKA_GROUP_ID: kafka-image-consumer
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET:-daq}
      MINIO_SECURE: "false"
      METRICS_PORT: ${IMAGE_CONSUMER_METRICS_PORT:-2118}
      LOG_LEVEL: ${IMAGE_CONSUMER_LOG_LEVEL:-INFO}
    logging:
      driver: "json-file"
      options: {max-size: "20m", max-file: "5"}

  # ── Kafka Frame Bridge ────────────────────────────────────────
  # raw.frame.images → raw.frame.metadata.decoded (Triton 트리거)
  kafka-frame-bridge:
    build:
      context: ./kafka-frame-bridge
      dockerfile: Dockerfile
    image: red-poc/kafka-frame-bridge:dev
    container_name: red-poc-kafka-frame-bridge
    restart: unless-stopped
    networks: [red-poc]
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "2120:2120"
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      KAFKA_INPUT_TOPIC: raw.frame.images
      KAFKA_OUTPUT_TOPIC: raw.frame.metadata.decoded
      KAFKA_GROUP_ID: kafka-frame-bridge
      MINIO_BUCKET: ${MINIO_BUCKET:-daq}
      BUNDLE_WINDOW_MS: ${FRAME_BRIDGE_BUNDLE_WINDOW_MS:-1000}
      SENSORS_EXPECTED: ${FRAME_BRIDGE_SENSORS_EXPECTED:-0}
      METRICS_PORT: ${FRAME_BRIDGE_METRICS_PORT:-2120}
      LOG_LEVEL: ${FRAME_BRIDGE_LOG_LEVEL:-INFO}
    logging:
      driver: "json-file"
      options: {max-size: "10m", max-file: "5"}

  # ── Kafka IMU Archiver ────────────────────────────────────────
  # raw.imu + raw.gps → MinIO Parquet
  kafka-imu-archiver:
    build:
      context: ./kafka-imu-archiver
      dockerfile: Dockerfile
    image: red-poc/kafka-imu-archiver:dev
    container_name: red-poc-kafka-imu-archiver
    restart: unless-stopped
    networks: [red-poc]
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
    ports:
      - "2121:2121"
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      KAFKA_INPUT_TOPICS: raw.imu,raw.gps
      KAFKA_GROUP_ID: kafka-imu-archiver
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET:-daq}
      MINIO_SECURE: "false"
      BATCH_SIZE: ${IMU_ARCHIVER_BATCH_SIZE:-1000}
      IDLE_FLUSH_SEC: ${IMU_ARCHIVER_IDLE_FLUSH_SEC:-90}
      METRICS_PORT: ${IMU_ARCHIVER_METRICS_PORT:-2121}
      LOG_LEVEL: ${IMU_ARCHIVER_LOG_LEVEL:-INFO}
    logging:
      driver: "json-file"
      options: {max-size: "10m", max-file: "5"}

  # ── DAQ Consumer ─────────────────────────────────────────────
  # 차량 sensor.* topic → transform → MinIO 저장
  daq-consumer:
    build:
      context: ./daq-consumer
      dockerfile: Dockerfile
    image: daq-consumer:latest
    container_name: daq-consumer
    restart: unless-stopped
    networks: [red-poc]
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      KAFKA_GROUP_ID: daq-consumer-group
      KAFKA_TOPICS: ${TOPIC_CAM0},${TOPIC_CAM1},${TOPIC_CAM2},${TOPIC_GNSS}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET:-daq}
      MAX_WORKERS: ${DAQ_CONSUMER_MAX_WORKERS:-4}
      LOG_LEVEL: ${DAQ_CONSUMER_LOG_LEVEL:-INFO}
    logging:
      driver: "json-file"
      options: {max-size: "20m", max-file: "5"}

  # ── Triton ONNX Export (최초 1회) ────────────────────────────
  triton-exporter:
    build:
      context: ./triton/exporter
    image: red-poc/triton-exporter:dev
    container_name: red-poc-triton-exporter
    networks: [red-poc]
    environment:
      SRC: /source/yolo26n.pt
      DEST_DIR: /models/yolo26n/1
      IMGSZ: "640"
      OPSET: "12"
    volumes:
      - /home/swmai/project/kepco/data/models/yolo:/source:ro
      - /home/swmai/project/kepco/infra/triton/model_repository:/models
    restart: "no"

  # ── Triton Inference Server ───────────────────────────────────
  triton:
    image: nvcr.io/nvidia/tritonserver:24.05-py3
    container_name: red-poc-triton
    restart: unless-stopped
    networks: [red-poc]
    depends_on:
      triton-exporter:
        condition: service_completed_successfully
    command:
      - tritonserver
      - --model-repository=/models
      - --strict-model-config=false
      - --model-control-mode=poll
      - --repository-poll-secs=30
      - --exit-on-error=false
    ports:
      - "8100:8000"
      - "8101:8001"
      - "8102:8002"
    volumes:
      - /home/swmai/project/kepco/infra/triton/model_repository:/models:ro
    logging:
      driver: "json-file"
      options: {max-size: "10m", max-file: "3"}

  # ── Processor (Java — Triton 추론 처리) ──────────────────────
  processor:
    build:
      context: ./processor
      dockerfile: Dockerfile
      target: runtime
    image: red-poc/processor:dev
    container_name: red-poc-processor
    restart: unless-stopped
    networks: [red-poc]
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      triton:
        condition: service_started
      minio:
        condition: service_healthy
    volumes:
      - ./processor/config/application.yml:/app/application.yml:ro
      - ./data/input/imu_gps.jsonl:/app/imu_gps.jsonl:ro
    logging:
      driver: "json-file"
      options: {max-size: "20m", max-file: "5"}

  # ── Notifier (Java — 이벤트 알림) ────────────────────────────
  notifier:
    build:
      context: ./notifier
      dockerfile: Dockerfile
      target: runtime
    image: red-poc/notifier:dev
    container_name: red-poc-notifier
    restart: unless-stopped
    networks: [red-poc]
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    volumes:
      - ./notifier/config/application.yml:/app/application.yml:ro
      - ./logs:/var/log/notifier
    logging:
      driver: "json-file"
      options: {max-size: "10m", max-file: "5"}

  # ── Transcoder ───────────────────────────────────────────────
  transcoder:
    build:
      context: ./transcoder
      dockerfile: Dockerfile
    image: red-poc/transcoder:dev
    container_name: red-poc-transcoder
    restart: unless-stopped
    networks: [red-poc]
    ports:
      - "2114:2114"
    volumes:
      - ./transcoder/config.yml:/app/config.yml:ro
    logging:
      driver: "json-file"
      options: {max-size: "10m", max-file: "3"}

  # ── Postgres ──────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: red-poc-postgres
    restart: unless-stopped
    networks: [red-poc]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-redpoc}
      POSTGRES_USER: ${POSTGRES_USER:-redpoc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-redpoc} -d ${POSTGRES_DB:-redpoc}"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging:
      driver: "json-file"
      options: {max-size: "10m", max-file: "3"}

  # ── EMQX (MQTT Broker) ────────────────────────────────────────
  emqx:
    image: emqx/emqx:5.3.2
    container_name: red-poc-emqx
    restart: unless-stopped
    networks: [red-poc]
    ports:
      - "1883:1883"
      - "8883:8883"
      - "8083:8083"
      - "18083:18083"
    environment:
      EMQX_NAME: emqx
      EMQX_HOST: 127.0.0.1
      EMQX_ALLOW_ANONYMOUS: ${EMQX_ALLOW_ANONYMOUS:-false}
      EMQX_LISTENERS__WS__DEFAULT__BIND: "0.0.0.0:8083"
      EMQX_LISTENERS__WS__DEFAULT__ENABLED: ${EMQX_WS_ENABLED:-true}
      EMQX_LISTENERS__WS__DEFAULT__WEBSOCKET__MQTT_PATH: /mqtt
    volumes:
      - emqx-data:/opt/emqx/data
      - emqx-log:/opt/emqx/log
    healthcheck:
      test: ["CMD", "emqx", "ctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging:
      driver: "json-file"
      options: {max-size: "10m", max-file: "3"}

  # ── MQTT → Kafka Bridge ────────────────────────────────────────
  mqtt-kafka-bridge:
    build:
      context: ./mqtt-kafka-bridge
      dockerfile: Dockerfile
    image: red-poc/mqtt-kafka-bridge:dev
    container_name: red-poc-mqtt-kafka-bridge
    restart: unless-stopped
    networks: [red-poc]
    depends_on:
      emqx:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      MQTT_HOST: emqx
      MQTT_PORT: "1883"
      KAFKA_BOOTSTRAP: kafka:9092
      METRICS_PORT: "2117"
      ROUTES: |
        - mqtt: vehicle/+/frames
          kafka: raw.frame.metadata
        - mqtt: vehicle/+/gps
          kafka: raw.gps
    logging:
      driver: "json-file"
      options: {max-size: "10m", max-file: "3"}

  # ── Kafka Exporter ────────────────────────────────────────────
  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.7.0
    container_name: red-poc-kafka-exporter
    restart: unless-stopped
    networks: [red-poc]
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - --kafka.server=kafka:9092
      - --web.listen-address=:9308
      - --log.level=warn
    ports:
      - "9308:9308"
    logging:
      driver: "json-file"
      options: {max-size: "5m", max-file: "3"}

  # ── Prometheus ────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: red-poc-prometheus
    restart: unless-stopped
    networks: [red-poc]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
      - --web.enable-lifecycle
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "19090:9090"
    logging:
      driver: "json-file"
      options: {max-size: "10m", max-file: "3"}

  # ── Grafana ───────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    container_name: red-poc-grafana
    restart: unless-stopped
    networks: [red-poc]
    depends_on: [prometheus]
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GF_SERVER_ROOT_URL}
      GF_SERVER_SERVE_FROM_SUB_PATH: ${GF_SERVER_SERVE_FROM_SUB_PATH:-true}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "13000:3000"
    logging:
      driver: "json-file"
      options: {max-size: "10m", max-file: "3"}

  # ── nginx Edge (SSL termination + 라우팅) ─────────────────────
  edge:
    image: nginx:1.27-alpine
    container_name: red-poc-edge
    restart: unless-stopped
    networks: [red-poc]
    depends_on:
      - kafka-rest-proxy
      - minio
    ports:
      - "8443:443"
      - "8080:80"
    volumes:
      - ./nginx/edge.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - edge-log:/var/log/nginx
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 443 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options: {max-size: "10m", max-file: "3"}
  # ── Topic Mapper ──────────────────────────────────────────────
  # sensor.cam*.jpeg → raw.frame.images (12B 헤더 제거 + ts_ns header 추가)
  # sensor.gnss      → raw.gps (schema 변환)
  topic-mapper:
    build:
      context: ./topic-mapper
      dockerfile: Dockerfile
    image: red-poc/topic-mapper:dev
    container_name: red-poc-topic-mapper
    restart: unless-stopped
    networks: [red-poc]
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "2123:2123"
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      GROUP_ID: topic-mapper
      SOURCE_CAM0: ${TOPIC_CAM0:-sensor.cam0.jpeg}
      SOURCE_CAM1: ${TOPIC_CAM1:-sensor.cam1.jpeg}
      SOURCE_CAM2: ${TOPIC_CAM2:-sensor.cam2.jpeg}
      SOURCE_GNSS: ${TOPIC_GNSS:-sensor.gnss}
      TARGET_CAM_TOPIC: raw.frame.images
      TARGET_GPS_TOPIC: raw.gps
      VEHICLE_ID_MAP: "{}"
      METRICS_PORT: "2123"
      LOG_LEVEL: INFO
    logging:
      driver: "json-file"
      options: {max-size: "10m", max-file: "5"}
