# ============================================================
#  daq-kafka-broker
#  실행: ./start.sh
#  종료: ./stop.sh
#  설정: .env 파일만 수정
# ============================================================

networks:
  broker-net:
    driver: bridge

volumes:
  kafka-data:

services:

  # ── Kafka (KRaft — Zookeeper 없음) ──────────────────────────
  broker:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    restart: unless-stopped
    networks: [broker-net]
    environment:
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qg"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@broker:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://broker:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_RETENTION_HOURS: ${KAFKA_LOG_RETENTION_HOURS:-72}
      KAFKA_LOG_RETENTION_BYTES: ${KAFKA_LOG_RETENTION_BYTES:-107374182400}
      KAFKA_MESSAGE_MAX_BYTES: ${KAFKA_MESSAGE_MAX_BYTES:-10485760}
      KAFKA_REPLICA_FETCH_MAX_BYTES: ${KAFKA_MESSAGE_MAX_BYTES:-10485760}
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    logging:
      driver: "json-file"
      options: {max-size: "20m", max-file: "5"}

  # ── Kafka REST Proxy ─────────────────────────────────────────
  # 차량이 HTTP POST 하는 엔드포인트
  # cloudflared 가 localhost:8082 로 터널 연결
  rest-proxy:
    image: confluentinc/cp-kafka-rest:7.6.1
    container_name: rest-proxy
    restart: unless-stopped
    networks: [broker-net]
    depends_on:
      broker:
        condition: service_healthy
    ports:
      - "8082:8082"
    environment:
      KAFKA_REST_HOST_NAME: rest-proxy
      KAFKA_REST_BOOTSTRAP_SERVERS: broker:9092
      KAFKA_REST_LISTENERS: http://0.0.0.0:8082
      KAFKA_REST_MAX_REQUEST_SIZE: ${KAFKA_MESSAGE_MAX_BYTES:-10485760}
      KAFKA_REST_PRODUCER_MAX_REQUEST_SIZE: ${KAFKA_MESSAGE_MAX_BYTES:-10485760}
    logging:
      driver: "json-file"
      options: {max-size: "10m", max-file: "5"}

  # ── DAQ Consumer ─────────────────────────────────────────────
  # topic consume → transform → MinIO 151번 저장
  daq-consumer:
    build:
      context: ./daq-consumer
      dockerfile: Dockerfile
    image: daq-consumer:latest
    container_name: daq-consumer
    restart: unless-stopped
    networks: [broker-net]
    depends_on:
      broker:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: broker:9092
      KAFKA_GROUP_ID: daq-consumer-group
      KAFKA_TOPICS: ${KAFKA_TOPICS}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MAX_WORKERS: ${CONSUMER_MAX_WORKERS:-4}
      LOG_LEVEL: ${CONSUMER_LOG_LEVEL:-INFO}
    logging:
      driver: "json-file"
      options: {max-size: "20m", max-file: "5"}

  # ── Cloudflare Tunnel ────────────────────────────────────────
  # trycloudflare: 계정/도메인 불필요, 자동 HTTPS URL 발급
  # 재시작 시 URL 변경 → start.sh 가 메일로 URL 발송
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    network_mode: host
    command: tunnel --url http://localhost:8082 --no-autoupdate
    logging:
      driver: "json-file"
      options: {max-size: "10m", max-file: "3"}
