# ============================================================
#  daq-kafka-broker  —  서버 66번 (192.168.1.66)
#
#  79번 red-poc-edge nginx + minio 까지 통합
#
#  스택:
#    broker        Kafka 7.6.1 KRaft
#    rest-proxy    Kafka REST Proxy :8082 (내부)
#    daq-consumer  topic consume → transform → MinIO
#    minio         MinIO :9000/:9001
#    nginx         :8443 SSL termination (79번 설정 그대로)
#
#  외부 접근:
#    https://221.147.232.196:8443/poc/kafka-rest  → rest-proxy
#    https://221.147.232.196:8443/poc/minio       → minio
#
#  실행: ./start.sh
#  종료: ./stop.sh
#  설정: .env 파일만 수정
# ============================================================

networks:
  broker-net:
    driver: bridge

volumes:
  kafka-data:
  minio-data:

services:

  # ── Kafka (KRaft — Zookeeper 없음) ──────────────────────────
  broker:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    restart: unless-stopped
    networks: [broker-net]
    environment:
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qg"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@broker:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://broker:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_RETENTION_HOURS: ${KAFKA_LOG_RETENTION_HOURS:-72}
      KAFKA_LOG_RETENTION_BYTES: ${KAFKA_LOG_RETENTION_BYTES:-107374182400}
      KAFKA_MESSAGE_MAX_BYTES: ${KAFKA_MESSAGE_MAX_BYTES:-10485760}
      KAFKA_REPLICA_FETCH_MAX_BYTES: ${KAFKA_MESSAGE_MAX_BYTES:-10485760}
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    logging:
      driver: "json-file"
      options: {max-size: "20m", max-file: "5"}

  # ── Kafka REST Proxy ─────────────────────────────────────────
  rest-proxy:
    image: confluentinc/cp-kafka-rest:7.6.1
    container_name: kafka-rest-proxy
    restart: unless-stopped
    networks: [broker-net]
    depends_on:
      broker:
        condition: service_healthy
    environment:
      KAFKA_REST_HOST_NAME: kafka-rest-proxy
      KAFKA_REST_BOOTSTRAP_SERVERS: broker:9092
      KAFKA_REST_LISTENERS: http://0.0.0.0:8082
      KAFKA_REST_MAX_REQUEST_SIZE: ${KAFKA_MESSAGE_MAX_BYTES:-10485760}
      KAFKA_REST_PRODUCER_MAX_REQUEST_SIZE: ${KAFKA_MESSAGE_MAX_BYTES:-10485760}
    logging:
      driver: "json-file"
      options: {max-size: "10m", max-file: "5"}

  # ── MinIO ────────────────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    container_name: minio
    restart: unless-stopped
    networks: [broker-net]
    ports:
      - "9000:9000"    # S3 API
      - "9001:9001"    # Console
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options: {max-size: "10m", max-file: "3"}

  # ── DAQ Consumer ─────────────────────────────────────────────
  daq-consumer:
    build:
      context: ./daq-consumer
      dockerfile: Dockerfile
    image: daq-consumer:latest
    container_name: daq-consumer
    restart: unless-stopped
    networks: [broker-net]
    depends_on:
      broker:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: broker:9092
      KAFKA_GROUP_ID: daq-consumer-group
      KAFKA_TOPICS: ${KAFKA_TOPICS}
      MINIO_ENDPOINT: http://minio:9000    # 내부 컨테이너 직접 접근
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MAX_WORKERS: ${CONSUMER_MAX_WORKERS:-4}
      LOG_LEVEL: ${CONSUMER_LOG_LEVEL:-INFO}
    logging:
      driver: "json-file"
      options: {max-size: "20m", max-file: "5"}

  # ── nginx (79번 red-poc-edge 설정 그대로) ────────────────────
  # 외부: https://221.147.232.196:8443
  # /poc/kafka-rest/ → kafka-rest-proxy:8082
  # /poc/minio/      → minio:9001
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx-edge
    restart: unless-stopped
    networks: [broker-net]
    ports:
      - "8443:443"    # 공유기 포트포워딩: 221.147.232.196:8443 → 192.168.1.66:8443
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - rest-proxy
      - minio
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options: {max-size: "10m", max-file: "3"}